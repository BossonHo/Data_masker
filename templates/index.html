<!DOCTYPE html>
<html>
<head>
    <title>LLM Masking Demo</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }
        textarea { width: 100%; height: 120px; margin-bottom: 10px; }
        select, button { padding: 8px; font-size: 1em; }
        .section { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px #ccc; margin-bottom: 20px; }
        h2 { margin-top: 0; }
    </style>
</head>
<body>
    <h1>🔐 LLM 隱私遮蔽工具</h1>
    
    <form method="post">
        <div class="section">
            <label for="input_text"><strong>輸入你的文字:</strong></label><br>
            <textarea name="input_text" id="input_text">{{ original }}</textarea><br>

            <label for="mode"><strong>遮蔽模式:</strong></label>
            <select name="mode" id="mode">
                <option value="semantic" {% if mode == 'semantic' %}selected{% endif %}>保留語意類別</option>
                <option value="strict" {% if mode == 'strict' %}selected{% endif %}>完全遮蔽</option>
            </select>

            <button type="submit">遮蔽</button>
        </div>

        {% if masked %}
        <div class="section">
            <h2>🔍遮蔽後輸出:</h2>
            <textarea readonly>{{ masked }}</textarea>
        </div>
        {% endif %}
    </form>
</body>
</html>
